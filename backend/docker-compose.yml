version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gzs_postgres
    environment:
      POSTGRES_DB: gzonesphere
      POSTGRES_USER: gzs_admin
      POSTGRES_PASSWORD: gzs_secure_password
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - gzs_db_data:/var/lib/postgresql/data

  core-api:
    build: ./core-api
    container_name: gzs_core_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://gzs_admin:gzs_secure_password@db:5432/gzonesphere
    depends_on:
      - db

  cms-api:
    build: ./cms-api
    container_name: gzs_cms_api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://gzs_admin:gzs_secure_password@db:5432/gzonesphere
    depends_on:
      - db

volumes:
  gzs_db_data:
